name: Cloud PC + Web Browser Link + Opera GX (Passwordless Fix)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Force Full HD Resolution
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Install and Configure UltraVNC Server (Auth Disabled)
        run: |
          # Install UltraVNC cleanly using Chocolatey
          choco install ultravnc -y --no-progress
          
          $uvncDir = "C:\Program Files\uvnc bvba\UltraVNC"
          $iniPath = "$uvncDir\ultravnc.ini"
          
          # AuthRequired=0 completely turns off the password prompt barrier
          $iniContent = @"
          [Permissions]
          [UltraVNC]
          AuthRequired=0
          CheckServerPort=1
          PortNumber=5900
          HttpPortNumber=5800
          AllowLoopback=1
          AcceptKeepAlive=1
          LoopbackOnly=0
          QuerySetting=2
          QueryTimeout=10
          QueryAccept=0
          QueryIfNoLogon=1
          InputsEnabled=1
          BlankMonitorEnabled=0
          [Server]
          Connection=1
          "@
          
          # Write the configuration file
          Out-File -FilePath $iniPath -InputObject $iniContent -Encoding ascii -Force
          
          # Register and launch the service clean
          Start-Process "$uvncDir\winvnc.exe" -ArgumentList "-install" -Wait
          Start-Process "$uvncDir\winvnc.exe" -ArgumentList "-startservice" -Wait
          
          Write-Host "UltraVNC Server successfully initialized in Open Auth Mode."

      - name: Download & Force Consumer Build of Opera GX
        run: |
          $Url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          Invoke-WebRequest -Uri $Url -OutFile "$env:TEMP\OperaGXSetup.exe"
          Start-Process -FilePath "$env:TEMP\OperaGXSetup.exe" -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait

      - name: Deploy Web Interface & Dynamic Gateway Engines
        run: |
          python -m pip install websockify --quiet --no-input --disable-pip-version-check --no-color --progress-bar off
          npm install -g localtunnel --silent --no-fund --no-audit --non-interactive
          
          New-Item -ItemType Directory -Path "C:\noVNC" -Force
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "novnc.zip"
          Expand-Archive -Path "novnc.zip" -DestinationPath "C:\noVNC" -Force
          Copy-Item -Path "C:\noVNC\noVNC-1.5.0\*" -Destination "C:\noVNC" -Recurse -Force

      - name: Start Services & Generate Auto-Login URLs
        run: |
          Write-Host "Launching Native Python Web Bridge..."
          Start-Process python -ArgumentList "-m websockify 8080 localhost:5900 --web C:\noVNC"
          
          # Verify port 8080 handshake
          $retries = 0
          while (-not (Test-NetConnection -ComputerName 127.0.0.1 -Port 8080).TcpTestSucceeded -and $retries -lt 15) {
              Start-Sleep -Seconds 2
              $retries++
          }
          
          $LogFile = "$env:TEMP\localtunnel.log"
          Start-Process cmd.exe -ArgumentList "/c lt --port 8080 > `"$LogFile`""
          Start-Sleep -Seconds 7
          
          $RawLink = (Get-Content $LogFile -Raw) | Select-String -Pattern 'https://[a-zA-Z0-9-]+\.loca\.lt' | Select-Object -ExpandProperty Matches | Select-Object -ExpandProperty Value -First 1
          
          if ($RawLink) {
              # Since auth is disabled, the direct URL layout drops straight to your desktop layout seamlessly
              $FinalUrl = $RawLink + "/vnc.html?autoconnect=true"
              Write-Host "===================================================="
              Write-Host "      WEB-BROWSER CLOUD PC IS READY TO CONNECT      "
              Write-Host "===================================================="
              Write-Host " CLICK LINK: $FinalUrl"
              Write-Host " SECURITY  : Open Authentication Active (No Password)"
              Write-Host "===================================================="
          } else {
              Write-Error "CRITICAL: Dynamic gateway assignment timed out."
          }

      - name: Keep alive
        run: Start-Sleep -Seconds 10000
